name: Feature request
description: Propose a focused color-preflight improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Print workflow problem
      description: Describe the concrete workflow and who needs it.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: How could it be validated?
      description: Separate automated evidence, formal conformance, and physical proof requirements.
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This does not require bundling a restricted ICC profile or customer artwork.
          required: true

