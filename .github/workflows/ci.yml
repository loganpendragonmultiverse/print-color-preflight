name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.10", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff format --check .
      - run: ruff check .
      - run: mypy src tests
      - run: pytest --cov --cov-report=term-missing
      - run: python -m build

  ghostscript-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project and Ghostscript
        run: |
          python -m pip install -e ".[dev]"
          sudo apt-get update
          sudo apt-get install --yes ghostscript
      - name: Locate packaged test profile
        run: echo "PRINT_COLOR_TEST_CMYK_PROFILE=$(find /usr/share -type f -iname 'default_cmyk.icc' -print -quit)" >> "$GITHUB_ENV"
      - run: pytest -m integration -v

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pip_audit

